// ─── Category Classification ─────────────────────────────────────────────────
const COAT_ONLY_CATS = ["Airmask Pocket", "Bandolero Pocket", "Coat Closure", "Collars & Chinstraps", "Core Shields", "Escape Pocket", "Undershield Pocket", "Flags", "Mic Tabs"];
const PANT_ONLY_CATS = ["Knees", "Suspender", "Pant Closures", "Take-Up Straps", "Boot Access", "Hip Pocket"];
const SHARED_CATS    = ["Bellows Pocket", "Belts & Harnesses", "CP Cuffs", "C&P Liner", "Contour Pocket", "Dead Air Panels", "Dividers", "D-RIngs", "Flashlight and Spanner Pocket", "Flashlight Strap", "Hoods", "Hooks Clips", "Hooks and Clips", "Internal Pocket", "Lettering Patches", "Liner Pkts and liner label pkts", "Loops", "Miscellaneous Pocket D05", "Notebook Pocket", "Patch Pocket", "Pencil Pocket", "Reinforcement", "Tool Holder", "Tool Pouch w. flap in Bellows PKT", "Trim"];

const COAT_CATS = [...COAT_ONLY_CATS, ...SHARED_CATS].filter(c => CATALOG[c]);
const PANT_CATS = [...PANT_ONLY_CATS, ...SHARED_CATS].filter(c => CATALOG[c]);

// ─── Helpers ─────────────────────────────────────────────────────────────────
const parsePrice = (p) => {
  if (!p || p === "TBD" || p === "") return null;
  const n = parseFloat(p.replace(/[$,]/g, ""));
  return isNaN(n) ? null : n;
};

const fmtPrice = (n) =>
  n == null ? "TBD" : "$" + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");

const makeKey = (garment, cat, idx) => `${garment}__${cat}__${idx}`;

// ─── Sub-components ──────────────────────────────────────────────────────────

function CategoryAccordion({ garment, catName, items, selections, onToggle }) {
  const [open, setOpen] = useState(false);
  const selCount = items.filter((_, i) =>
    selections[makeKey(garment, catName, i)]
  ).length;
  const catTotal = items.reduce((acc, item, i) => {
    if (!selections[makeKey(garment, catName, i)]) return acc;
    const p = parsePrice(item.price);
    return acc + (p ?? 0);
  }, 0);
  const hasTBD = items.some(
    (item, i) => selections[makeKey(garment, catName, i)] && item.price === "TBD"
  );

  return (
    <div className="border border-slate-700 rounded-lg overflow-hidden mb-2">
      <button
        onClick={() => setOpen((o) => !o)}
        className="w-full flex items-center justify-between px-4 py-3 bg-slate-800 hover:bg-slate-750 text-left transition-colors"
        style={{ backgroundColor: open ? "#1e3a5f" : undefined }}
      >
        <div className="flex items-center gap-3">
          <span className="text-sm font-semibold text-slate-100">{catName}</span>
          {selCount > 0 && (
            <span className="text-xs bg-red-600 text-white rounded-full px-2 py-0.5 font-bold">
              {selCount}
            </span>
          )}
        </div>
        <div className="flex items-center gap-3">
          {selCount > 0 && (
            <span className={`text-xs font-mono font-semibold ${hasTBD ? "text-amber-400" : "text-emerald-400"}`}>
              {hasTBD ? "+" : ""}{fmtPrice(catTotal)}{hasTBD ? " +TBD" : ""}
            </span>
          )}
          <svg
            className={`w-4 h-4 text-slate-400 transition-transform ${open ? "rotate-180" : ""}`}
            fill="none" viewBox="0 0 24 24" stroke="currentColor"
          >
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </button>

      {open && (
        <div className="bg-slate-900 divide-y divide-slate-800">
          {items.map((item, i) => {
            const key = makeKey(garment, catName, i);
            const checked = !!selections[key];
            const isTBD = item.price === "TBD" || item.price === "";
            const price = parsePrice(item.price);
            const desc = item.description && item.description !== "-" && item.description !== ""
              ? item.description : "—";
            return (
              <label
                key={key}
                className={`flex items-start gap-3 px-4 py-2.5 cursor-pointer transition-colors hover:bg-slate-800 ${checked ? "bg-slate-800/60" : ""}`}
              >
                <input
                  type="checkbox"
                  checked={checked}
                  onChange={() => onToggle(key)}
                  className="mt-0.5 w-4 h-4 accent-red-500 flex-shrink-0"
                />
                <div className="flex-1 min-w-0">
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0">
                      <span className="text-xs font-mono text-blue-300 mr-2">{item.sku}</span>
                      <span className="text-sm text-slate-200">{desc}</span>
                    </div>
                    <span className={`text-xs font-mono font-semibold flex-shrink-0 ml-2 px-1.5 py-0.5 rounded ${
                      isTBD
                        ? "bg-amber-900/50 text-amber-300 border border-amber-600/40"
                        : price === 0
                        ? "text-slate-500"
                        : "text-emerald-300"
                    }`}>
                      {isTBD ? "TBD" : fmtPrice(price)}
                    </span>
                  </div>
                </div>
              </label>
            );
          })}
        </div>
      )}
    </div>
  );
}

function GarmentTab({ garment, categories, selections, onToggle, searchQuery }) {
  const filtered = useMemo(() => {
    if (!searchQuery) return categories;
    const q = searchQuery.toLowerCase();
    return categories.filter(cat => {
      if (cat.toLowerCase().includes(q)) return true;
      return CATALOG[cat]?.some(item =>
        item.sku.toLowerCase().includes(q) ||
        item.description.toLowerCase().includes(q)
      );
    });
  }, [categories, searchQuery]);

  return (
    <div className="space-y-1">
      {filtered.length === 0 && (
        <p className="text-slate-500 text-sm text-center py-8">No options match your search.</p>
      )}
      {filtered.map(cat => (
        <CategoryAccordion
          key={cat}
          garment={garment}
          catName={cat}
          items={CATALOG[cat] || []}
          selections={selections}
          onToggle={onToggle}
        />
      ))}
    </div>
  );
}

function OverviewPanel({ selections }) {
  const coatItems = [];
  const pantItems = [];

  COAT_CATS.forEach(cat => {
    (CATALOG[cat] || []).forEach((item, i) => {
      const key = makeKey("coat", cat, i);
      if (selections[key]) coatItems.push({ cat, ...item });
    });
  });
  PANT_CATS.forEach(cat => {
    (CATALOG[cat] || []).forEach((item, i) => {
      const key = makeKey("pant", cat, i);
      if (selections[key]) pantItems.push({ cat, ...item });
    });

  const coatTotal = coatItems.reduce((s, i) => s + (parsePrice(i.price) ?? 0), 0);
  const pantTotal = pantItems.reduce((s, i) => s + (parsePrice(i.price) ?? 0), 0);
  const grandTotal = coatTotal + pantTotal;
  const coatTBD = coatItems.filter(i => i.price === "TBD");
  const pantTBD = pantItems.filter(i => i.price === "TBD");

  const renderTable = (items, label, total, tbdItems) => (
    <div className="bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
      <div className="px-4 py-3 bg-gradient-to-r from-blue-900 to-slate-800 border-b border-slate-700">
        <h3 className="font-bold text-white text-sm tracking-widest uppercase">{label} Selections</h3>
      </div>
      {items.length === 0 ? (
        <p className="text-slate-500 text-sm text-center py-6">No {label.toLowerCase()} options selected.</p>
      ) : (
        <div className="divide-y divide-slate-700">
          {items.map((item, idx) => {
            const isTBD = item.price === "TBD";
            return (
              <div key={idx} className="flex items-center justify-between px-4 py-2 text-xs">
                <div className="flex-1 min-w-0 mr-3">

                  <div className="text-blue-400 font-mono">{item.sku}</div>

                <span className={`font-mono font-semibold flex-shrink-0 px-1.5 py-0.5 rounded text-xs ${

      {/* Grand Total */}
      <div className="bg-gradient-to-r from-blue-900 via-slate-800 to-red-900/40 rounded-xl p-4 border border-blue-700/40">
        <div className="flex justify-between items-center">
          <div>
            <div className="text-xs text-slate-400 uppercase tracking-wider">Grand Total — Full Suit</div>
            <div className="text-2xl font-bold text-white font-mono mt-1">{fmtPrice(grandTotal)}</div>
            {(coatTBD.length + pantTBD.length) > 0 && (
              <div className="text-xs text-amber-400 mt-1">
                + {coatTBD.length + pantTBD.length} item(s) pending pricing
              </div>
            )}
          </div>
          <button
            onClick={() => generatePDF(coatItems, pantItems, coatTotal, pantTotal, grandTotal)}
            className="flex items-center gap-2 bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow-lg"
          >
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Generate Quote PDF
          </button>
        </div>
      </div>

      {/* TBD Notes */}
      {(coatTBD.length + pantTBD.length) > 0 && (
        <div className="bg-amber-900/20 border border-amber-600/30 rounded-xl p-4">
          <h4 className="text-amber-300 font-bold text-sm mb-2 flex items-center gap-2">
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.193 2.5 1.732 2.5z" />
            </svg>
            Pricing Pending — TBD Items

          <div className="space-y-1">
            {[...coatTBD.map(i => ({...i, garment: "Coat"})), ...pantTBD.map(i => ({...i, garment: "Pant"}))].map((item, idx) => (
              <div key={idx} className="text-xs text-amber-200 flex gap-2">
                <span className="text-amber-500 font-bold">[{item.garment}]</span>
                <span className="font-mono text-amber-400">{item.sku}</span>

}

// ─── PDF Generation ──────────────────────────────────────────────────────────
async function generatePDF(coatItems, pantItems, coatTotal, pantTotal, grandTotal) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "letter" });

  const NAVY = [13, 37, 78];
  const RED = [185, 28, 28];
  const GOLD = [180, 130, 20];
  const WHITE = [255, 255, 255];
  const LIGHT = [240, 244, 250];
  const AMBER = [180, 100, 0];
  const pageW = 215.9;
  const pageH = 279.4;
  const margin = 14;

  const today = new Date().toLocaleDateString("en-US", {
    year: "numeric", month: "long", day: "numeric"
  });

  function drawHeader(doc, pageNum) {
    // Navy header bar
    doc.setFillColor(...NAVY);
    doc.rect(0, 0, pageW, 38, "F");
    // Red accent stripe
    doc.setFillColor(...RED);
    doc.rect(0, 38, pageW, 2.5, "F");
    // Morning Pride logo embedded
    try {
      doc.addImage(MP_LOGO_B64, "PNG", margin, 4, 30, 30);
    } catch(e) {
      doc.setFontSize(7);
      doc.setTextColor(...GOLD);
      doc.setFont("helvetica", "bold");
      doc.text("MORNING PRIDE", margin + 15, 20, { align: "center" });
    }
    // Title
    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.setTextColor(...WHITE);
    doc.text("TURNOUT GEAR QUOTE", pageW / 2, 17, { align: "center" });
    doc.setFontSize(8);
    doc.setFont("helvetica", "normal");
    doc.setTextColor(180, 200, 230);
    doc.text(`Prepared by Horizon Turnout Gear  |  ${today}`, pageW / 2, 25, { align: "center" });
    doc.setFontSize(7);
    doc.text(`Page ${pageNum}`, pageW - margin, 25, { align: "right" });
  }

  function drawFooter(doc) {
    doc.setFillColor(...NAVY);
    doc.rect(0, pageH - 16, pageW, 16, "F");
    doc.setFontSize(7);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(...GOLD);
    doc.text("HORIZON TURNOUT GEAR", margin, pageH - 10);
    doc.setFont("helvetica", "normal");
    doc.setTextColor(180, 200, 230);
    doc.text("Steve Smith | Strategic Sales Leader | 407-232-4493 | steve@horizonturnout.com", margin, pageH - 6);
    doc.setTextColor(150, 170, 200);
    doc.text("John Grivalsky | Principal Member | 973-703-0888 | john@horizonturnout.com", margin, pageH - 2.5);
  }

  function customerBlock(doc, startY) {
    doc.setFillColor(...LIGHT);
    doc.roundedRect(margin, startY, pageW - margin * 2, 32, 2, 2, "F");
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.setTextColor(...NAVY);
    doc.text("CUSTOMER INFORMATION", margin + 4, startY + 7);
    doc.setDrawColor(...NAVY);
    doc.setLineWidth(0.3);
    const fields = [
      ["Department / Organization:", ""],
      ["Contact Name:", ""],
      ["Address:", ""],
      ["Phone:", ""],
    ];
    const colW = (pageW - margin * 2 - 8) / 2;
    fields.forEach((f, idx) => {
      const col = idx % 2;
      const row = Math.floor(idx / 2);
      const x = margin + 4 + col * colW;
      const y = startY + 14 + row * 8;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(6.5);
      doc.setTextColor(...NAVY);
      doc.text(f[0], x, y);
      doc.setDrawColor(150, 160, 180);
      doc.line(x, y + 4, x + colW - 6, y + 4);
    });
    return startY + 36;
  }

  function drawItemsTable(doc, items, startY, title, total) {
    if (items.length === 0) return startY;
    
    // Section title
    doc.setFillColor(...NAVY);
    doc.roundedRect(margin, startY, pageW - margin * 2, 8, 1, 1, "F");
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(...WHITE);
    doc.text(title, margin + 4, startY + 5.5);
    startY += 10;

    // Table header
    doc.setFillColor(...RED);
    doc.rect(margin, startY, pageW - margin * 2, 6.5, "F");
    doc.setFont("helvetica", "bold");
    doc.setFontSize(7);
    doc.setTextColor(...WHITE);
    const colCat = margin + 2;
    const colSKU = margin + 38;
    const colDesc = margin + 60;
    const colPrice = pageW - margin - 2;
    doc.text("CATEGORY", colCat, startY + 4.5);
    doc.text("SKU", colSKU, startY + 4.5);
    doc.text("DESCRIPTION", colDesc, startY + 4.5);
    doc.text("PRICE", colPrice, startY + 4.5, { align: "right" });
    startY += 7;

    let rowY = startY;
    items.forEach((item, idx) => {
      if (rowY > pageH - 50) {
        doc.addPage();
        drawHeader(doc, doc.internal.getCurrentPageInfo().pageNumber);
        drawFooter(doc);
        rowY = 48;
      }
      const isTBD = item.price === "TBD";
      const bg = idx % 2 === 0 ? [248, 250, 252] : [255, 255, 255];
      doc.setFillColor(...bg);
      doc.rect(margin, rowY, pageW - margin * 2, 5.5, "F");
      doc.setFont("helvetica", "normal");
      doc.setFontSize(6.5);
      doc.setTextColor(60, 80, 100);
      // Category (truncated)
      const catStr = (item.cat || "").substring(0, 18);
      doc.text(catStr, colCat, rowY + 3.8);
      // SKU
      doc.setFont("courier", "normal");
      doc.setTextColor(30, 60, 120);
      doc.text(item.sku, colSKU, rowY + 3.8);
      // Description
      doc.setFont("helvetica", "normal");
      doc.setTextColor(40, 50, 70);
      const descStr = (item.description && item.description !== "-" ? item.description : item.sku).substring(0, 45);
      doc.text(descStr, colDesc, rowY + 3.8);
      // Price
      if (isTBD) {
        doc.setTextColor(...AMBER);
        doc.setFont("helvetica", "bold");
        doc.text("TBD", colPrice, rowY + 3.8, { align: "right" });
      } else {
        doc.setTextColor(20, 120, 60);
        doc.setFont("helvetica", "bold");
        doc.text(fmtPrice(parsePrice(item.price)), colPrice, rowY + 3.8, { align: "right" });
      }
      rowY += 5.5;
    });

    // Subtotal row
    const tbdCount = items.filter(i => i.price === "TBD").length;
    doc.setFillColor(...NAVY);
    doc.rect(margin, rowY, pageW - margin * 2, 7, "F");
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.setTextColor(...WHITE);
    doc.text("SUBTOTAL", colCat, rowY + 5);
    doc.setTextColor(100, 220, 150);
    const subtotalStr = fmtPrice(total) + (tbdCount > 0 ? ` + ${tbdCount} TBD` : "");
    doc.text(subtotalStr, colPrice, rowY + 5, { align: "right" });
    return rowY + 10;
  }

  // ── Page 1: Coat ──────────────────────────────────────────────────────
  drawHeader(doc, 1);
  drawFooter(doc);
  let y = 44;
  y = customerBlock(doc, y);
  y += 4;
  y = drawItemsTable(doc, coatItems, y, "COAT OPTIONS", coatTotal);

  // ── Page 2: Pants + Grand Total ───────────────────────────────────────
  doc.addPage();
  drawHeader(doc, 2);
  drawFooter(doc);
  y = 44;
  y = drawItemsTable(doc, pantItems, y, "PANT OPTIONS", pantTotal);
  y += 4;

  // Grand total box
  if (y > pageH - 60) {
    doc.addPage();
    drawHeader(doc, doc.internal.getCurrentPageInfo().pageNumber);
    drawFooter(doc);
    y = 48;
  }
  doc.setFillColor(...NAVY);
  doc.roundedRect(margin, y, pageW - margin * 2, 24, 3, 3, "F");
  doc.setFont("helvetica", "bold");
  doc.setFontSize(12);
  doc.setTextColor(...GOLD);
  doc.text("GRAND TOTAL — FULL SUIT", margin + 4, y + 9);
  doc.setFontSize(16);
  doc.setTextColor(...WHITE);
  doc.text(fmtPrice(grandTotal), pageW - margin - 4, y + 9, { align: "right" });
  const allTBD = [...coatItems, ...pantItems].filter(i => i.price === "TBD");
  if (allTBD.length > 0) {
    doc.setFontSize(7.5);
    doc.setTextColor(...AMBER);
    doc.setFont("helvetica", "italic");
    doc.text(`* ${allTBD.length} item(s) are pending manufacturer pricing and not included above.`, margin + 4, y + 17);
  }
  doc.setFontSize(7);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(150, 170, 210);
  doc.text("This quote is valid for 30 days. Subject to change based on final specifications.", margin + 4, y + 22);
  y += 30;

  // TBD section if any
  if (allTBD.length > 0 && y < pageH - 50) {
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.setTextColor(...AMBER);
    doc.text("ITEMS WITH PENDING PRICING (TBD):", margin, y);
    y += 6;
    allTBD.forEach((item) => {
      if (y > pageH - 30) return;
      doc.setFont("courier", "normal");
      doc.setFontSize(6.5);
      doc.setTextColor(140, 100, 20);
      doc.text(`  [${item.garment || item.cat}]  ${item.sku}  —  ${item.description}`, margin, y);
      y += 4.5;
    });
  }

  doc.save("Morning_Pride_Quote.pdf");
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState("coat");
  const [selections, setSelections] = useState({});
  const [search, setSearch] = useState("");
  const handleToggle = useCallback((key) => {
    setSelections(prev => ({ ...prev, [key]: !prev[key] }));
  }, []);

  const coatTotal = useMemo(() => {
    return COAT_CATS.reduce((sum, cat) => {
      return sum + (CATALOG[cat] || []).reduce((s, item, i) => {
        const key = makeKey("coat", cat, i);
        if (!selections[key]) return s;
        return s + (parsePrice(item.price) ?? 0);
      }, 0);
    }, 0);
  }, [selections]);

  const pantTotal = useMemo(() => {
    return PANT_CATS.reduce((sum, cat) => {
      return sum + (CATALOG[cat] || []).reduce((s, item, i) => {
        const key = makeKey("pant", cat, i);
        if (!selections[key]) return s;
        return s + (parsePrice(item.price) ?? 0);
      }, 0);
    }, 0);
  }, [selections]);

  const grandTotal = coatTotal + pantTotal;
  const totalTBD = useMemo(() => {
    return Object.keys(selections).filter(k => {
      if (!selections[k]) return false;
      const parts = k.split("__");
      const garment = parts[0], cat = parts[1], idx = parseInt(parts[2]);
      const item = (CATALOG[cat] || [])[idx];
      return item?.price === "TBD";
    }).length;
  }, [selections]);

  const totalSelected = Object.values(selections).filter(Boolean).length;

  const tabs = [
    { id: "coat", label: "🧥  Coat", count: COAT_CATS.length },
    { id: "pant", label: "👖  Pants", count: PANT_CATS.length },
    { id: "overview", label: "📋  Overview", count: null },
  ];

  // Load jsPDF from CDN if not present
  const [pdfReady, setPdfReady] = useState(false);
  useMemo(() => {
    if (typeof window !== "undefined" && !window.jspdf) {
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      script.onload = () => setPdfReady(true);
      document.head.appendChild(script);
    } else if (window.jspdf) {
      setPdfReady(true);
    }
  }, []);

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100 font-sans">
      {/* ── Header ─────────────────────────────────────────────────────── */}
      <header className="bg-gradient-to-r from-slate-900 via-blue-950 to-slate-900 border-b border-slate-700 shadow-xl">
        <div className="max-w-7xl mx-auto px-4 py-4">
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            {/* Logo + Title */}
            <div className="flex items-center gap-4">
              <div className="w-20 h-16 bg-white rounded-lg flex items-center justify-center overflow-hidden shadow-lg border border-slate-600 p-1">
                <img src={MP_LOGO_B64} alt="Morning Pride Logo" className="w-full h-full object-contain" />
              </div>
              <div>
                <div className="text-xs font-bold tracking-widest text-red-400 uppercase">Morning Pride</div>
                <h1 className="text-xl sm:text-2xl font-black text-white leading-tight tracking-tight">
                  Turnout Gear
                  <span className="text-red-500"> Builder</span>
                </h1>
                <div className="text-xs text-slate-400 mt-0.5">Horizon Turnout Gear — Authorized Distributor</div>
              </div>
            </div>

            {/* Running Total */}
            <div className="bg-slate-800/80 border border-slate-600 rounded-xl px-5 py-3 min-w-[200px]">
              <div className="text-xs text-slate-400 uppercase tracking-wider mb-1">Running Total</div>
              <div className="text-2xl font-black text-white font-mono">{fmtPrice(grandTotal)}</div>
              <div className="flex justify-between text-xs mt-1 text-slate-400">
                <span>Coat: <span className="text-blue-300 font-mono">{fmtPrice(coatTotal)}</span></span>
                <span>Pants: <span className="text-purple-300 font-mono">{fmtPrice(pantTotal)}</span></span>
              </div>
              <div className="flex gap-3 text-xs mt-1">
                <span className="text-slate-500">{totalSelected} selected</span>
                {totalTBD > 0 && (
                  <span className="text-amber-400">{totalTBD} TBD</span>
                )}
              </div>
            </div>
          </div>
        </div>
      </header>

      {/* ── Tab Bar ────────────────────────────────────────────────────── */}
      <div className="bg-slate-900 border-b border-slate-700 sticky top-0 z-10 shadow-lg">
        <div className="max-w-7xl mx-auto px-4">
          <div className="flex gap-1 pt-2">
            {tabs.map(tab => (
              <button
                key={tab.id}
                onClick={() => { setActiveTab(tab.id); setSearch(""); }}
                className={`px-4 sm:px-6 py-2.5 text-sm font-semibold rounded-t-lg transition-all border-b-2 ${
                  activeTab === tab.id
                    ? "bg-blue-900/60 border-red-500 text-white"
                    : "border-transparent text-slate-400 hover:text-slate-200 hover:bg-slate-800/50"
                }`}
              >
                {tab.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── Main Content ────────────────────────────────────────────────── */}
      <main className="max-w-7xl mx-auto px-4 py-6">
        {/* Search bar (coat/pant tabs only) */}
        {activeTab !== "overview" && (
          <div className="mb-4">
            <input
              type="text"
              placeholder="Search categories, SKUs, or descriptions…"
              value={search}
              onChange={e => setSearch(e.target.value)}
              className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
            />
          </div>
        )}

        {activeTab === "coat" && (
          <GarmentTab
            garment="coat"
            categories={COAT_CATS}
            selections={selections}
            onToggle={handleToggle}
            searchQuery={search}
          />
        )}
        {activeTab === "pant" && (
          <GarmentTab
            garment="pant"
            categories={PANT_CATS}
            selections={selections}
            onToggle={handleToggle}
            searchQuery={search}
          />
        )}
        {activeTab === "overview" && (
          <OverviewPanel selections={selections} />
        )}
      </main>
    </div>
  );
}

// ─── Mount ───────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

  </script>

  <!-- ── Service Worker registration ─────────────────────────────────────── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/service-worker.js', { scope: '/' })
          .then(reg => {
            console.log('[App] Service Worker registered, scope:', reg.scope);

            // Notify user when an update is available
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (
                  newWorker.state === 'installed' &&
                  navigator.serviceWorker.controller
                ) {
                  // A new version is waiting — show a subtle toast
                  const toast = document.createElement('div');
                  toast.innerText = '🔄 Update available — close & reopen to refresh.';
                  toast.style.cssText = [
                    'position:fixed', 'bottom:1rem', 'left:50%',
                    'transform:translateX(-50%)', 'z-index:9999',
                    'background:#1e3a5f', 'color:#fff',
                    'padding:.75rem 1.5rem', 'border-radius:.5rem',
                    'font:14px/1.4 sans-serif', 'box-shadow:0 4px 16px rgba(0,0,0,.4)',
                    'cursor:pointer'
                  ].join(';');
                  toast.addEventListener('click', () => window.location.reload());
                  document.body.appendChild(toast);
                  setTimeout(() => toast.remove(), 8000);
                }
              });
            });
          })
          .catch(err => console.error('[App] Service Worker registration failed:', err));
      });
    }
  </script>
