  const doc = new jsPDF({

  const NAVY = [13, 37, 78],

  const W = 215.9,
    H = 279.4,

  const today = new Date().toLocaleDateString('en-US', {
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
  function hdr(pg) {
    doc.setFillColor(...NAVY);
    doc.rect(0, 0, W, 40, 'F');
    doc.setFillColor(...RED);
    doc.rect(0, 40, W, 2.5, 'F');
    try {
      doc.addImage(MP_LOGO_B64, 'PNG', M, 5, 30, 30);
    } catch (e) {}
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(15);
    doc.setTextColor(...WHITE);
    doc.text('TURNOUT GEAR QUOTE', W / 2, 16, {
      align: 'center'
    });
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(180, 200, 230);
    doc.text(`Horizon Turnout Gear  |  Morning Pride Authorized Distributor  |  ${today}`, W / 2, 24, {
      align: 'center'
    });
    doc.setFontSize(7);
    doc.text(`Page ${pg}`, W - M, 24, {
      align: 'right'
    });
  }
  function ftr() {
    doc.setFillColor(...NAVY);
    doc.rect(0, H - 20, W, 20, 'F');
    doc.setFontSize(6);
    doc.setFont('helvetica', 'italic');
    doc.setTextColor(180, 200, 230);
    doc.text('ESTIMATE ONLY — This document is not a final or binding quote. Prices are subject to change based on final specifications,', M, H - 14);
    doc.text('material availability, and formal order confirmation. Contact your Horizon Turnout Gear representative for a binding quotation.', M, H - 10);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(6.5);
    doc.setTextColor(...GOLD);
    doc.text('Steve Smith | 407-232-4493 | steve@horizonturnout.com', M, H - 5.5);
    doc.setTextColor(150, 170, 200);
    doc.setFont('helvetica', 'normal');
    doc.text('John Grivalsky | 973-703-0888 | john@horizonturnout.com', W / 2 + 10, H - 5.5);
  }
  function quoteBlock(y) {
    doc.setFillColor(240, 244, 250);
    doc.roundedRect(M, y, W - M * 2, 38, 2, 2, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(...NAVY);

    const half = (W - M * 2 - 8) / 2;
    const fields = [['Dealer / Distributor:', quoteInfo.dealer || ''], ['Salesman:', quoteInfo.salesman || ''], ['Department / Organization:', quoteInfo.department || ''], ['Date:', quoteInfo.date || today]];
    fields.forEach(([label, val], idx) => {
      const col = idx % 2,
        row = Math.floor(idx / 2);
      const x = M + 4 + col * half,
        fy = y + 14 + row * 9;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(6.5);
      doc.setTextColor(...NAVY);
      doc.text(label, x, fy);

  }

  doc.setFontSize(11);
  doc.setTextColor(...GOLD);
  doc.text('GRAND TOTAL — FULL SUIT', M + 4, y + 10);
  doc.setFontSize(18);
  doc.setTextColor(...WHITE);
  doc.text(fmtMoney(grandTotal), W - M - 4, y + 10, {

  });

  <!-- ── Service Worker registration ─────────────────────────────────────── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/service-worker.js', { scope: '/' })
          .then(reg => {
            console.log('[App] Service Worker registered, scope:', reg.scope);

            // Notify user when an update is available
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (
                  newWorker.state === 'installed' &&
                  navigator.serviceWorker.controller
                ) {
                  // A new version is waiting — show a subtle toast
                  const toast = document.createElement('div');
                  toast.innerText = '🔄 Update available — close & reopen to refresh.';
                  toast.style.cssText = [
                    'position:fixed', 'bottom:1rem', 'left:50%',
                    'transform:translateX(-50%)', 'z-index:9999',
                    'background:#1e3a5f', 'color:#fff',
                    'padding:.75rem 1.5rem', 'border-radius:.5rem',
                    'font:14px/1.4 sans-serif', 'box-shadow:0 4px 16px rgba(0,0,0,.4)',
                    'cursor:pointer'
                  ].join(';');
                  toast.addEventListener('click', () => window.location.reload());
                  document.body.appendChild(toast);
                  setTimeout(() => toast.remove(), 8000);
                }
              });
            });
          })
          .catch(err => console.error('[App] Service Worker registration failed:', err));
      });
    }
  </script>
